<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>XV Anos — Convite Digital | Justech</title>
<meta name="description" content="Convite digital premium — Justech Convites" />

<!-- Tipografia: serif de exibição elegante + sans utilitária discreta -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css?v=20260717b" />
</head>
<body>

<!-- ======================================================
     TELA INICIAL — abertura cinematográfica do envelope
     A arte do envelope é uma imagem pronta (assets/envelope.jpg)
     e NUNCA é recriada em HTML/CSS — apenas posicionada, iluminada
     e animada como um todo (fade, escala, brilho passando por cima).
     ====================================================== -->
<section id="splash-screen" class="splash">

  <!-- Camada de partículas douradas (canvas, desenhado via JS) -->
  <canvas id="particles-canvas" aria-hidden="true"></canvas>

  <!-- Glow ambiente e vinheta, complementando o feixe de luz já presente na imagem -->
  <div class="glow-radial" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <div class="envelope-scene" id="envelope-scene">

    <div class="envelope-visual" id="envelope-visual">
      <img class="envelope-img" src="assets/envelope.jpg?v=20260717b" alt="Envelope de convite de luxo, verde-oliva com laço dourado e selo de cera" draggable="false" />
      <!-- Brilho que desliza sobre o laço dourado periodicamente -->
      <span class="ribbon-glint" aria-hidden="true"></span>
    </div>

    <button id="enter-btn" class="enter-btn" type="button">
      <span class="enter-btn-glow" aria-hidden="true"></span>
      <span class="enter-btn-label">Abrir Convite</span>
    </button>

  </div>

  <!-- Carta branca elegante que sobe do envelope e se transforma no convite.
       Fica fora de .envelope-scene, em position:fixed, para poder se
       expandir suavemente até preencher a tela inteira. -->
  <div class="letter-sparkles" id="letter-sparkles" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="letter-card" id="letter-card" aria-hidden="true">
    <span class="letter-corner tl" aria-hidden="true"></span>
    <span class="letter-corner tr" aria-hidden="true"></span>
    <span class="letter-corner bl" aria-hidden="true"></span>
    <span class="letter-corner br" aria-hidden="true"></span>
    <div class="letter-paper" aria-hidden="true"></div>
    <div class="letter-foil-sweep" aria-hidden="true"></div>
    <div class="letter-seal" id="letter-seal" aria-hidden="true">
      <svg viewBox="0 0 100 100" width="100%" height="100%">
        <circle cx="50" cy="50" r="47" fill="url(#sealGrad)" stroke="#f4e4bc" stroke-width="1.5"/>
        <path d="M50 24 L56 40 L73 40 L59 50 L64 66 L50 56 L36 66 L41 50 L27 40 L44 40 Z" fill="#3a3320" opacity="0.85"/>
        <defs>
          <radialGradient id="sealGrad" cx="35%" cy="30%" r="80%">
            <stop offset="0%" stop-color="#e9cf8f"/>
            <stop offset="55%" stop-color="#b6813b"/>
            <stop offset="100%" stop-color="#6b4315"/>
          </radialGradient>
        </defs>
      </svg>
    </div>
    <div class="letter-backdrop" id="letter-backdrop" aria-hidden="true"></div>
    <div class="letter-art" id="letter-art" aria-hidden="true"></div>
  </div>

</section>

<!-- ======================================================
     TELA PRINCIPAL — O CONVITE (imagem única + hotspots)
     ====================================================== -->
<section id="invite-screen" class="invite" hidden>

  <!-- Partículas ambiente contínuas (mais discretas que na splash) -->
  <canvas id="particles-canvas-invite" aria-hidden="true"></canvas>

  <div class="invite-frame">
    <div class="invite-backdrop" id="invite-backdrop" aria-hidden="true"></div>
    <div class="invite-image-wrap" id="invite-image-wrap">
      <img id="invite-image" class="invite-image" src="assets/convite.jpg" alt="Convite de XV Anos" draggable="false" />
    </div>

    <!-- Recorte animado da personagem (assets/personagem.png), posicionado
         via JS exatamente sobre a mesma figura na arte do convite (mesma
         lógica de alinhamento usada nos hotspots). Ganha um leve balanço
         contínuo (respiração + oscilação), sensação de movimento sutil
         sem jamais se descolar da arte original. -->
    <div id="character-frame" class="character-frame" aria-hidden="true">
      <img id="character-layer" class="character-layer" src="assets/personagem.png" alt="" draggable="false" />
    </div>

    <!-- Faixa de luz que percorre o convite periodicamente, reforçando a
         sensação de "convite vivo" -->
    <div class="invite-shimmer" aria-hidden="true"></div>

    <!-- Borboletas douradas que atravessam a tela em voos suaves e
         contínuos, em looping, com tamanhos/tempos/rotas diferentes -->
    <div class="butterflies-layer" aria-hidden="true">
      <div class="butterfly b1">
        <svg viewBox="0 0 100 70" width="100%" height="100%">
          <g class="wing wing-l"><path d="M50 35 C 30 5, 0 5, 4 30 C 6 46, 30 46, 50 35 Z" fill="#e0b95c"/></g>
          <g class="wing wing-r"><path d="M50 35 C 70 5, 100 5, 96 30 C 94 46, 70 46, 50 35 Z" fill="#d4a94a"/></g>
          <ellipse cx="50" cy="35" rx="2.6" ry="10" fill="#5c4a22"/>
        </svg>
      </div>
      <div class="butterfly b2">
        <svg viewBox="0 0 100 70" width="100%" height="100%">
          <g class="wing wing-l"><path d="M50 35 C 30 5, 0 5, 4 30 C 6 46, 30 46, 50 35 Z" fill="#f0d99a"/></g>
          <g class="wing wing-r"><path d="M50 35 C 70 5, 100 5, 96 30 C 94 46, 70 46, 50 35 Z" fill="#e0b95c"/></g>
          <ellipse cx="50" cy="35" rx="2.6" ry="10" fill="#5c4a22"/>
        </svg>
      </div>
      <div class="butterfly b3">
        <svg viewBox="0 0 100 70" width="100%" height="100%">
          <g class="wing wing-l"><path d="M50 35 C 30 5, 0 5, 4 30 C 6 46, 30 46, 50 35 Z" fill="#d4a94a"/></g>
          <g class="wing wing-r"><path d="M50 35 C 70 5, 100 5, 96 30 C 94 46, 70 46, 50 35 Z" fill="#f0d99a"/></g>
          <ellipse cx="50" cy="35" rx="2.6" ry="10" fill="#5c4a22"/>
        </svg>
      </div>
    </div>

    <!-- Sapinho que salta pela tela em direção à personagem, faz uma
         pausa perto dela, e depois volta — um pequeno "conto" que
         se repete em loop -->
    <div id="frog" class="frog" aria-hidden="true">
      <svg viewBox="0 0 90 70" width="100%" height="100%">
        <ellipse cx="45" cy="46" rx="30" ry="20" fill="#7d8f3f"/>
        <ellipse cx="45" cy="44" rx="24" ry="15" fill="#95a94c"/>
        <ellipse cx="22" cy="20" rx="10" ry="10" fill="#7d8f3f"/>
        <ellipse cx="68" cy="20" rx="10" ry="10" fill="#7d8f3f"/>
        <circle cx="22" cy="18" r="5" fill="#2f2a18"/>
        <circle cx="68" cy="18" r="5" fill="#2f2a18"/>
        <circle cx="20" cy="16" r="1.6" fill="#fff8e6"/>
        <circle cx="66" cy="16" r="1.6" fill="#fff8e6"/>
        <path d="M32 52 Q45 60 58 52" stroke="#4a5a26" stroke-width="2" fill="none" stroke-linecap="round"/>
        <ellipse cx="14" cy="56" rx="8" ry="5" fill="#7d8f3f"/>
        <ellipse cx="76" cy="56" rx="8" ry="5" fill="#7d8f3f"/>
      </svg>
    </div>

    <!-- Hotspots (áreas clicáveis invisíveis) são injetados aqui via JS,
         a partir do objeto config.hotspots em script.js -->
    <div id="hotspots-layer" class="hotspots-layer" aria-label="Ações do convite"></div>
  </div>

  <!-- Controle de música flutuante -->
  <div id="music-control" class="music-control" role="group" aria-label="Controle de música">
    <button id="music-toggle" class="music-btn" type="button" aria-label="Tocar música">
      <span id="music-icon">▶</span>
    </button>
    <input id="music-volume" class="music-volume" type="range" min="0" max="1" step="0.01" value="0.6" aria-label="Volume da música" />
  </div>

</section>

<audio id="bg-audio" src="assets/music.mp3" preload="none" loop></audio>

<script src="script.js?v=20260717b"></script>
</body>
</html>
